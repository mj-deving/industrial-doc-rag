name = "industrial-doc-rag"
main = "src/index.ts"
compatibility_date = "2026-05-13"
workers_dev = true

[observability]
enabled = true

# bge-m3: 1024 dimensions, multilingual. The corpus is English; the questions are
# not necessarily, and a monolingual encoder would answer a German question about
# an English datasheet by simply not finding it.
[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "idr-datasheets"

# Two smaller indices, for the scaling curve only. They hold the first 5 and the
# first 100 datasheets, so latency and cost can be measured against real indices
# of each size. A metadata filter over the big index would measure a different
# thing: Vectorize prices queries against the number of vectors STORED, and a
# filtered search over 36k vectors is not a search over 400.
[[vectorize]]
binding = "VECTORIZE_S"
index_name = "idr-scale-s"

[[vectorize]]
binding = "VECTORIZE_M"
index_name = "idr-scale-m"

# No blob store. The PDFs are Nexperia's documents, and their asset host serves
# them at a deterministic URL keyed on the part number, so a citation links to the
# vendor's own copy. Mirroring them into R2 would mean republishing someone else's
# documents to save a redirect. We index the text and cite the source.

[vars]
EMBEDDING_MODEL = "@cf/baai/bge-m3"
